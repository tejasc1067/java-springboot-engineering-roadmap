spring:
  datasource:
    url: jdbc:h2:mem:flyway-demo;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    # Flyway owns the schema. JPA only validates that the entities match.
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
