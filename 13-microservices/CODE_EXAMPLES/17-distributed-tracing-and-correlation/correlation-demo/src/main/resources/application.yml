server:
  port: 8080

spring:
  application:
    name: order-service

# Where order-service calls. Default points at the scaffold's inventory-service.
inventory:
  uri: http://localhost:8081

# Every log line includes [correlationId] — that's what lets you grep one request out of
# the interleaved logs of a busy service. Micrometer Tracing uses [traceId,spanId] here.
logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%X{correlationId:-no-correlation-id}] %-5level %logger{24} - %msg%n"
