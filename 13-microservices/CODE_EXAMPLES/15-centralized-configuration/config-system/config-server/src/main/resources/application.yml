server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    # "native" = serve config from the local classpath/filesystem instead of a git repo,
    # so the demo needs no external git. In production you'd point it at a git repo
    # (spring.cloud.config.server.git.uri) so config is versioned and auditable.
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config/
